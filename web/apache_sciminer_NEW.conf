<VirtualHost *:8888>
    ServerName localhost:8888
    ServerAdmin sciminer@localhost

    # Document root for SciMiner (updated paths)
    DocumentRoot /home/sciminer/legacy/web/html

    # Directory configuration
    <Directory /home/sciminer/legacy/web/html>
        Options Indexes FollowSymLinks ExecCGI
        AllowOverride All
        Require all granted
    </Directory>

    # Enable CGI for .cgi files in SciMiner directory
    <Directory "/home/sciminer/legacy/web/html/SciMiner">
        Options +ExecCGI
        AddHandler cgi-script .cgi .pl
        Require all granted
    </Directory>

    # DirectoryIndex - serve SciMiner directory by default
    DirectoryIndex SciMiner/ index.html index.htm

    # Error and access logs
    ErrorLog ${APACHE_LOG_DIR}/sciminer_error.log
    CustomLog ${APACHE_LOG_DIR}/sciminer_access.log combined

    # Set environment variables for SciMiner
    SetEnv PERL5LIB /home/sciminer/legacy/annotation/SciMinerDB/Modules
    SetEnv PATH "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

    # Increase timeout for long-running scripts
    <IfModule mod_reqtimeout.c>
        RequestReadTimeout header=20-40,MinRate=500 body=10,MinRate=500
    </IfModule>
</VirtualHost>